<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtiqPRO v18.0</title>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body.dark-mode {
            --bg: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --border: #374151;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            transition: 0.3s;
        }

        .app-container {
            max-width: 900px;
            margin: auto;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dark { background: #4b5563; color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .field input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            box-sizing: border-box;
        }

        #scanner-view {
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            border: 3px solid var(--primary);
        }

        #scanner-view video {
            width: 100% !important;
            object-fit: cover !important;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .product-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
        }

        .product-item:hover { border-color: var(--primary); }

        .footer-credits {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
        }

        .footer-credits a { color: var(--primary); text-decoration: none; font-weight: bold; margin: 0 10px; }

        #print-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 30px;
        }

        .label-card {
            border: 1px solid #000;
            padding: 10px;
            background: white;
            color: black;
            text-align: center;
            position: relative;
        }

        /* Modal Tutorial */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        @media print {
            .app-container, .modal, .btn-del-label { display: none !important; }
            #print-area { grid-template-columns: repeat(3, 1fr); gap: 5mm; }
        }
    </style>
</head>
<body>

<div class="sound-assets" style="display:none;">
    <audio id="snd-scan" src="https://assets.mixkit.co/sfx/preview/mixkit-barcodes-scanner-beep-1069.mp3"></audio>
    <audio id="snd-cam" src="https://assets.mixkit.co/sfx/preview/mixkit-camera-shutter-click-1133.mp3"></audio>
    <audio id="snd-add" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-interface-click-1112.mp3"></audio>
    <audio id="snd-clear" src="https://assets.mixkit.co/sfx/preview/mixkit-paper-trash-crumple-2357.mp3"></audio>
</div>

<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-size: 24px;">📦 EtiqPRO <span style="color:var(--primary)">v18</span></h1>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-dark" onclick="toggleTheme()">🌓</button>
            <button class="btn btn-primary" onclick="openGuide()">❓ Tutorial</button>
        </div>
    </div>

    <div id="scanner-view" style="display:none; margin-bottom:20px;"></div>

    <div class="input-grid">
        <div class="field">
            <label>Código / EAN</label>
            <div style="display:flex; gap:8px;">
                <input id="code" placeholder="000000" oninput="searchDB(this.value)">
                <button class="btn btn-dark" onclick="toggleScanner()">📷</button>
            </div>
        </div>
        <div class="field">
            <label>Nome do Produto</label>
            <input id="name" placeholder="Descrição">
        </div>
        <div class="field" style="max-width: 100px;">
            <label>Qtd</label>
            <input id="qty" type="number" value="1">
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px;">
        <button class="btn btn-primary" onclick="addLabels()">➕ Gerar Etiquetas</button>
        <button class="btn btn-success" onclick="window.print()">🖨️ Imprimir PDF</button>
        <button class="btn btn-danger" onclick="clearArea()">🗑️ Limpar</button>
    </div>

    <div style="margin-top:30px;">
        <h3 style="font-size:16px;">📂 Produtos Salvos (Toque para usar)</h3>
        <div class="product-grid" id="db-list"></div>
    </div>

    <div class="footer-credits">
        <p>Desenvolvido por: <b>Lucas Silva Sousa</b></p>
        <a href="https://www.instagram.com/lucassilvasousa_48" target="_blank">📸 @lucassilvasousa_48</a>
        <a href="https://wa.me/5594992786664" target="_blank">💬 WhatsApp</a>
    </div>
</div>

<div id="print-area"></div>

<div class="modal" id="modal-tutorial">
    <div class="modal-content">
        <h2 style="margin-top:0">🚀 Guia de Uso</h2>
        <p>1. Digite o código ou use a câmera 📷.</p>
        <p>2. Clique em "Gerar" para criar a etiqueta na tela.</p>
        <p>3. Clique em "Imprimir" para gerar o PDF pronto para folha A4.</p>
        <button class="btn btn-primary" style="width:100%" onclick="closeGuide()">Entendi!</button>
    </div>
</div>

<script>
let etiquetas = [];
let banco = JSON.parse(localStorage.getItem('etiq_v18_db')) || {};

function playSnd(id) {
    const audio = document.getElementById(id);
    if(audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
}

function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('etiq_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}
if(localStorage.getItem('etiq_theme') === 'dark') document.body.classList.add('dark-mode');

function openGuide() { document.getElementById('modal-tutorial').style.display = 'flex'; }
function closeGuide() { document.getElementById('modal-tutorial').style.display = 'none'; }

function searchDB(val) {
    if(banco[val]) document.getElementById('name').value = banco[val];
}

function addLabels() {
    const c = document.getElementById('code').value.trim();
    const n = document.getElementById('name').value.trim();
    const q = parseInt(document.getElementById('qty').value) || 1;

    if(!c || !n) return alert("Preencha Código e Nome!");

    banco[c] = n;
    localStorage.setItem('etiq_v18_db', JSON.stringify(banco));
    playSnd('snd-add');

    for(let i=0; i<q; i++) {
        etiquetas.push({ id: Date.now() + i, c, n });
    }

    renderEtiquetas();
    renderBanco();
}

function renderEtiquetas() {
    const area = document.getElementById('print-area');
    area.innerHTML = "";
    etiquetas.forEach(e => {
        const div = document.createElement('div');
        div.className = 'label-card';
        div.innerHTML = `
            <div style="font-weight:bold; font-size:11px; margin-bottom:5px;">${e.n}</div>
            <svg id="s${e.id}"></svg>
            <button class="btn-del-label" onclick="removeLabel(${e.id})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; padding:2px 5px;">X</button>
        `;
        area.appendChild(div);
        JsBarcode(`#s${e.id}`, e.c, { format: "CODE128", width: 1.5, height: 45, displayValue: true });
    });
}

function renderBanco() {
    const list = document.getElementById('db-list');
    list.innerHTML = "";
    Object.keys(banco).reverse().forEach(code => {
        const div = document.createElement('div');
        div.className = 'product-item';
        div.onclick = () => { document.getElementById('code').value = code; searchDB(code); playSnd('snd-add'); };
        div.innerHTML = `<b>${banco[code]}</b><br><small>${code}</small>`;
        list.appendChild(div);
    });
}

function removeLabel(id) {
    etiquetas = etiquetas.filter(e => e.id !== id);
    renderEtiquetas();
}

function clearArea() {
    if(confirm("Limpar tela?")) { playSnd('snd-clear'); etiquetas = []; renderEtiquetas(); }
}

let scanner;
async function toggleScanner() {
    const v = document.getElementById('scanner-view');
    if (v.style.display === 'block') {
        if(scanner) await scanner.stop();
        v.style.display = 'none';
        return;
    }
    playSnd('snd-cam');
    v.style.display = 'block';
    if(!scanner) scanner = new Html5Qrcode("scanner-view");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: {width: 250, height: 150} }, (txt) => {
        playSnd('snd-scan');
        document.getElementById('code').value = txt;
        searchDB(txt);
        scanner.stop();
        v.style.display = 'none';
    }).catch(() => { alert("Permita a câmera no cadeado do navegador!"); v.style.display = 'none'; });
}

renderBanco();
</script>
</body>
</html>
