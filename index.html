<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtiqPRO v19.6 - Lucas Silva</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; --border: #e5e7eb; }
        body.dark-mode { --bg: #111827; --card: #1f2937; --text: #f9fafb; --border: #374151; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .app-container { max-width: 900px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Menu Corrigido */
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .nav-link { text-decoration: none; font-size: 12px; padding: 8px 14px; background: var(--bg); color: var(--text); border-radius: 8px; border: 1px solid var(--border); font-weight: bold; }
        .nav-link.active { background: var(--primary); color: white; border-color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--card); color: var(--text); font-size: 16px; }
        
        /* Ajuste do botão X */
        .clear-btn { position: absolute; right: 45px; background: #9ca3af; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 5; }
        
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        #print-area { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 30px; }
        .label-card { border: 1px solid #000; padding: 10px; background: white; color: black; text-align: center; }
        @media print { .app-container, .nav-menu { display: none !important; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="nav-menu">
        <a href="index.html" class="nav-link active">🏷️ Etiquetas</a>
        <a href="estoque.html" class="nav-link">📦 Estoque Pro</a>
    </div>

    <div class="input-grid">
        <div class="field">
            <label>Código / EAN</label>
            <div class="input-wrapper">
                <input id="code" placeholder="000000">
                <button class="clear-btn" onclick="document.getElementById('code').value=''">✕</button>
                <button class="btn btn-primary" style="margin-left:5px; padding: 10px;" onclick="toggleScanner()">📷</button>
            </div>
        </div>
        <div class="field">
            <label>Produto</label>
            <input id="name" placeholder="Nome do item">
        </div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="addLabels()">➕ Gerar Etiquetas</button>
    <div id="print-area"></div>
</div>

<script>
    let etiquetas = [];
    function addLabels() {
        const c = document.getElementById('code').value, n = document.getElementById('name').value;
        if(!c || !n) return alert("Preencha tudo!");
        etiquetas.push({ id: Date.now(), c, n });
        render();
    }
    function render() {
        const area = document.getElementById('print-area'); area.innerHTML = "";
        etiquetas.forEach(e => {
            const div = document.createElement('div'); div.className = 'label-card';
            div.innerHTML = `<div>${e.n}</div><svg id="s${e.id}"></svg>`;
            area.appendChild(div);
            JsBarcode(`#s${e.id}`, e.c, { width: 1.5, height: 40, displayValue: true });
        });
    }
    function toggleScanner() { /* Scanner Logic */ }
</script>
</body>
</html>
