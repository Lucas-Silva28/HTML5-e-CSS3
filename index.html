<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtiqPRO v19.1</title>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        body.dark-mode {
            --bg: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --border: #374151;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            transition: 0.3s;
        }

        .app-container {
            max-width: 900px;
            margin: auto;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-dark { background: #4b5563; color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .field { position: relative; }
        .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        
        .field input {
            width: 100%;
            padding: 12px;
            padding-right: 40px; 
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            box-sizing: border-box;
        }

        /* Ajuste específico para o campo com câmera para o X não subir nela */
        #code { padding-right: 85px; }

        .clear-btn {
            position: absolute;
            right: 10px;
            background: #9ca3af;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            z-index: 5;
        }

        /* Move o X do código mais para a esquerda para dar espaço à câmera */
        .clear-btn-code { right: 55px; }

        .clear-btn:hover { opacity: 1; background: var(--danger); }

        #scanner-view {
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            border: 3px solid var(--primary);
        }

        #scanner-view video { width: 100% !important; object-fit: cover !important; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .product-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .product-item:hover { border-color: var(--primary); }

        .footer-credits {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
        }

        .footer-credits a { color: var(--primary); text-decoration: none; font-weight: bold; margin: 0 10px; }

        #print-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 30px;
        }

        .label-card {
            border: 1px solid #000;
            padding: 10px;
            background: white;
            color: black;
            text-align: center;
            position: relative;
        }

        @media print {
            .app-container, .btn-del-label, .clear-btn { display: none !important; }
            #print-area { grid-template-columns: repeat(3, 1fr); gap: 5mm; }
        }
    </style>
</head>
<body>

<div class="sound-assets" style="display:none;">
    <audio id="snd-scan" src="https://assets.mixkit.co/sfx/preview/mixkit-barcodes-scanner-beep-1069.mp3"></audio>
    <audio id="snd-cam" src="https://assets.mixkit.co/sfx/preview/mixkit-camera-shutter-click-1133.mp3"></audio>
    <audio id="snd-add" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-interface-click-1112.mp3"></audio>
    <audio id="snd-clear" src="https://assets.mixkit.co/sfx/preview/mixkit-paper-trash-crumple-2357.mp3"></audio>
</div>

<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-size: 24px;">📦 EtiqPRO <span style="color:var(--primary)">v19.1</span></h1>
        <button class="btn btn-dark" onclick="toggleTheme()">🌓</button>
    </div>

    <div id="scanner-view" style="display:none; margin-bottom:20px;"></div>

    <div class="input-grid">
        <div class="field">
            <label>Código / EAN</label>
            <div class="input-wrapper">
                <input id="code" placeholder="000000">
                <button class="clear-btn clear-btn-code" onclick="clearField('code')">✕</button>
                <button class="btn btn-dark" style="margin-left:5px; padding: 10px 12px; height: 44px;" onclick="toggleScanner()">📷</button>
            </div>
        </div>
        <div class="field">
            <label>Nome do Produto</label>
            <div class="input-wrapper">
                <input id="name" placeholder="Descrição">
                <button class="clear-btn" onclick="clearField('name')">✕</button>
            </div>
        </div>
        <div class="field" style="max-width: 100px;">
            <label>Qtd</label>
            <div class="input-wrapper">
                <input id="qty" type="number" value="1">
                <button class="clear-btn" onclick="clearField('qty')">✕</button>
            </div>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px;">
        <button class="btn btn-primary" onclick="addLabels()">➕ Gerar Etiquetas</button>
        <button class="btn btn-success" onclick="window.print()">🖨️ Imprimir PDF</button>
        <button class="btn btn-danger" onclick="clearArea()">🗑️ Limpar</button>
    </div>

    <div style="margin-top:30px;">
        <h3 style="font-size:16px;">📂 Galeria (Toque para gerar etiqueta)</h3>
        <div class="product-grid" id="db-list"></div>
    </div>

    <div class="footer-credits">
        <p>Desenvolvido por: <b>Lucas Silva Sousa</b></p>
        <a href="https://www.instagram.com/lucassilvasousa_48" target="_blank">📸 Instagram</a>
        <a href="https://wa.me/5594992786664" target="_blank">💬 WhatsApp</a>
    </div>
</div>

<div id="print-area"></div>

<script>
let etiquetas = [];
let banco = JSON.parse(localStorage.getItem('etiq_v19_db')) || {};

function playSnd(id) {
    const audio = document.getElementById(id);
    if(audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
}

function clearField(id) {
    document.getElementById(id).value = id === 'qty' ? '1' : '';
    document.getElementById(id).focus();
}

function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('etiq_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}
if(localStorage.getItem('etiq_theme') === 'dark') document.body.classList.add('dark-mode');

function addLabels(customCode, customName) {
    const c = customCode || document.getElementById('code').value.trim();
    const n = customName || document.getElementById('name').value.trim();
    const q = parseInt(document.getElementById('qty').value) || 1;

    if(!c || !n) return alert("Preencha Código e Nome!");

    banco[c] = n;
    localStorage.setItem('etiq_v19_db', JSON.stringify(banco));
    playSnd('snd-add');

    for(let i=0; i<q; i++) {
        etiquetas.push({ id: Date.now() + i, c, n });
    }
    renderEtiquetas();
    renderBanco();
}

function renderEtiquetas() {
    const area = document.getElementById('print-area');
    area.innerHTML = "";
    etiquetas.forEach(e => {
        const div = document.createElement('div');
        div.className = 'label-card';
        div.innerHTML = `
            <div style="font-weight:bold; font-size:11px; margin-bottom:5px;">${e.n}</div>
            <svg id="s${e.id}"></svg>
            <button class="btn-del-label" onclick="removeLabel(${e.id})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; padding:2px 5px; cursor:pointer;">X</button>
        `;
        area.appendChild(div);
        JsBarcode(`#s${e.id}`, e.c, { format: "CODE128", width: 1.5, height: 45, displayValue: true });
    });
}

function renderBanco() {
    const list = document.getElementById('db-list');
    list.innerHTML = "";
    Object.keys(banco).reverse().forEach(code => {
        const div = document.createElement('div');
        div.className = 'product-item';
        div.onclick = () => addLabels(code, banco[code]);
        div.innerHTML = `
            <b>${banco[code]}</b><br><small>${code}</small>
            <button onclick="event.stopPropagation(); deleteDB('${code}')" style="position:absolute; top:2px; right:2px; border:none; background:none; color:red; cursor:pointer;">×</button>
        `;
        list.appendChild(div);
    });
}

function deleteDB(c) {
    if(confirm("Remover da galeria?")) {
        delete banco[c];
        localStorage.setItem('etiq_v19_db', JSON.stringify(banco));
        renderBanco();
    }
}

function removeLabel(id) {
    etiquetas = etiquetas.filter(e => e.id !== id);
    renderEtiquetas();
}

function clearArea() {
    if(confirm("Limpar etiquetas da tela?")) { playSnd('snd-clear'); etiquetas = []; renderEtiquetas(); }
}

let scanner;
async function toggleScanner() {
    const v = document.getElementById('scanner-view');
    if (v.style.display === 'block') {
        if(scanner) await scanner.stop();
        v.style.display = 'none';
        return;
    }
    playSnd('snd-cam');
    v.style.display = 'block';
    if(!scanner) scanner = new Html5Qrcode("scanner-view");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: {width: 250, height: 150} }, (txt) => {
        playSnd('snd-scan');
        document.getElementById('code').value = txt;
        if(banco[txt]) document.getElementById('name').value = banco[txt];
        scanner.stop();
        v.style.display = 'none';
    }).catch(() => { alert("Permita a câmera!"); v.style.display = 'none'; });
}

renderBanco();
</script>
</body>
</html>
